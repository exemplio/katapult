# Permite compilar los klibs de iosArm64 desde Linux (verificación en local).
# El ENLACE del framework sigue exigiendo macOS: lo hace CI en katapult-go.yml.
kotlin.native.enableKlibsCrossCompilation=true

# El enlace de Kotlin/Native 2.3.x se queda sin heap con los 512m-1g por
# defecto del runner de CI (OutOfMemoryError en linkReleaseFrameworkIosArm64).
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
kotlin.daemon.jvmargs=-Xmx4g
