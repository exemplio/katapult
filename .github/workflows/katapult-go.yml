# Compila Katapult Go (el dev client) sin firmar, en un runner macOS.
# El IPA resultante se firma localmente con `katapult sign` y se instala con
# `katapult install` — el mismo flujo de la Fase 1.
name: Katapult Go (unsigned)

on:
  workflow_dispatch:
  push:
    tags:
      - 'go-v*'

jobs:
  build:
    runs-on: macos-26
    defaults:
      run:
        working-directory: katapult-go
    steps:
      - uses: actions/checkout@v4

      # El modo Go embebe un framework Kotlin (anfitrión Zipline). Se enlaza
      # aquí porque Kotlin/Native solo enlaza binarios de iOS en macOS.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Cachés de Gradle (wrapper, dependencias, build cache): el 85% del
      # tiempo del run era descargar esto desde cero cada vez.
      - uses: gradle/actions/setup-gradle@v4

      # El toolchain de Kotlin/Native (~1 GB en ~/.konan) solo cambia al subir
      # de versión de Kotlin: al actualizarla, actualizar también esta clave.
      - name: Caché del toolchain Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-2.3.21

      # Debug a propósito: es el dev client, y Kotlin/Native en Release hace
      # optimización de programa completo (la lección medida de katapult-demo:
      # el recorte grande del build vino de compilar en Debug).
      - name: Enlazar GoRuntime.framework (Kotlin)
        working-directory: .  # el build de Gradle vive en la raíz del repo
        run: ./gradlew :go-runtime:linkDebugFrameworkIosArm64

      # XcodeGen convierte project.yml en un .xcodeproj real. Así no versionamos
      # el .pbxproj, que es ilegible y conflictivo.
      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Generar el proyecto Xcode
        run: xcodegen generate

      - name: Compilar .app sin firmar
        run: |
          xcodebuild \
            -project KatapultGo.xcodeproj \
            -scheme KatapultGo \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Empaquetar en .ipa
        run: |
          APP=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          test -n "$APP" || { echo "No se encontró el .app"; exit 1; }
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr "KatapultGo-unsigned.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: katapult-go-unsigned
          path: katapult-go/KatapultGo-unsigned.ipa
          retention-days: 7
