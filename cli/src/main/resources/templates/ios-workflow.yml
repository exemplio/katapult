# Generado por Katapult — compila un IPA iOS SIN FIRMAR para un proyecto
# Kotlin Multiplatform. La firma se hace localmente con `katapult sign`.
#
# Basado en el flujo probado de geap-fit (Expo → generalizado a KMP).
name: __APP_NAME__ iOS (unsigned)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    # La imagen define la versión de Xcode y por tanto el SDK de iOS. Compose
    # Multiplatform 1.11+ necesita el SDK de iOS 26 (macos-26). Ajustable con
    # "runnerImage" en katapult.json.
    runs-on: __RUNNER_IMAGE__
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Cachea dependencias y el compilador Kotlin/Native (~1GB) entre builds
      - name: Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-

      # CocoaPods solo si el proyecto lo usa (el wizard KMP puro no lo necesita)
      - name: CocoaPods (si aplica)
        run: |
          if [ -f iosApp/Podfile ]; then
            cd iosApp && pod install
          fi

      # Compila SIN firmar. Xcode invoca a Gradle para compilar el framework
      # Kotlin/Native (embedAndSignAppleFrameworkForXcode) durante este paso.
      - name: Compilar .app sin firmar
        run: |
          xcodebuild \
            -project __XCODE_PROJECT__ \
            -scheme __SCHEME__ \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Empaquetar en .ipa
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          test -n "$APP_PATH" || { echo "No se encontró el .app"; exit 1; }
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr "__APP_NAME__-unsigned.ipa" Payload

      - name: Subir IPA como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: __ARTIFACT_NAME__
          path: __APP_NAME__-unsigned.ipa
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Firma + publicación OTA. Corre en LINUX a propósito: zsign no necesita macOS
  # y los minutos Linux cuestan 1x en vez de 10x.
  #
  # Solo se activa si el repo tiene configurados los secrets de firma. Sin ellos
  # el job se salta y el flujo local (`katapult sign`) sigue funcionando igual.
  # ---------------------------------------------------------------------------
  sign-and-release:
    needs: build-ios
    runs-on: ubuntu-latest
    if: vars.KATAPULT_OTA == 'true'
    permissions:
      contents: write        # crear el release donde vive el IPA
    steps:
      - uses: actions/checkout@v4

      - name: Descargar el IPA sin firmar
        uses: actions/download-artifact@v4
        with:
          name: __ARTIFACT_NAME__

      - name: Instalar zsign
        run: |
          curl -sL -o zsign.tar.gz \
            https://github.com/zhlynn/zsign/releases/download/v1.1.1/zsign-linux-x86_64.tar.gz
          tar -xzf zsign.tar.gz
          chmod +x $(find . -name zsign -type f | head -1)
          echo "ZSIGN=$(find $PWD -name zsign -type f | head -1)" >> $GITHUB_ENV

      - name: Restaurar certificado y perfil
        env:
          CERT_B64: ${{ secrets.KATAPULT_CERT_P12 }}
          PROFILE_B64: ${{ secrets.KATAPULT_PROVISIONING_PROFILE }}
        run: |
          echo "$CERT_B64" | base64 -d > cert.p12
          echo "$PROFILE_B64" | base64 -d > profile.mobileprovision

      - name: Firmar
        env:
          CERT_PASSWORD: ${{ secrets.KATAPULT_CERT_PASSWORD }}
        run: |
          "$ZSIGN" -k cert.p12 -p "$CERT_PASSWORD" -m profile.mobileprovision \
                   -o "__APP_NAME__.ipa" -z 9 "__APP_NAME__-unsigned.ipa"
          rm -f cert.p12 profile.mobileprovision

      # iOS instala por aire leyendo este manifest. Exige HTTPS con certificado
      # válido: los Releases de GitHub lo cumplen.
      - name: Generar manifest OTA
        run: |
          TAG="ota-${{ github.run_number }}"
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/__APP_NAME__.ipa"
          cat > manifest.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict><key>items</key><array><dict>
            <key>assets</key><array><dict>
              <key>kind</key><string>software-package</string>
              <key>url</key><string>${IPA_URL}</string>
            </dict></array>
            <key>metadata</key><dict>
              <key>bundle-identifier</key><string>__BUNDLE_ID__</string>
              <key>bundle-version</key><string>${{ github.run_number }}</string>
              <key>kind</key><string>software</string>
              <key>title</key><string>__APP_NAME__</string>
            </dict>
          </dict></array></dict>
          </plist>
          PLIST
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Publicar release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" "__APP_NAME__.ipa" manifest.plist \
            --title "__APP_NAME__ (OTA #${{ github.run_number }})" \
            --notes "Instalación OTA: abre el enlace de abajo desde el iPhone."

          MANIFEST="https://github.com/${{ github.repository }}/releases/download/${TAG}/manifest.plist"
          INSTALL="itms-services://?action=download-manifest&url=${MANIFEST}"
          {
            echo "## 📲 Instalar en el iPhone"
            echo ""
            echo "Abre este enlace **desde Safari en el iPhone**:"
            echo ""
            echo "\`${INSTALL}\`"
          } >> $GITHUB_STEP_SUMMARY
